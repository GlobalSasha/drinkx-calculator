<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>DrinkX — Калькулятор для ритейл сетей</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    /* ═══ NEXUS INTERFACE · design system ═══
       Palette · #E4E2DD neutral · #F97316 accent · #0F172A ink · #94A3B8 border
       Rhythm · 4px base · Radii · 0px (flat) or 31px (hero)
       Type · System font · light 300 display · light 300 body · medium 500 labels
    */
    :root {
      --nx-bg: #E4E2DD;
      --nx-surface: #FFFFFF;
      --nx-ink: #0F172A;
      --nx-accent: #F97316;
      --nx-muted: #64748B;
      --nx-border: #94A3B8;
      --nx-border-soft: #CBD5E1;
    }
    * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    html, body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
      font-weight: 300;
      letter-spacing: -0.01em;
      color: var(--nx-ink);
    }
    body {
      background: var(--nx-bg);
      background-image:
        linear-gradient(rgba(148,163,184,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(148,163,184,0.06) 1px, transparent 1px);
      background-size: 32px 32px;
    }
    /* Display hierarchy — light weights per spec */
    h1, .nx-display { font-weight: 300 !important; letter-spacing: -0.05em; line-height: 1.05; }
    h2 { font-weight: 400 !important; letter-spacing: -0.02em; }
    h3 { font-weight: 500 !important; }
    /* Labels — medium, uppercase-capable */
    .nx-label { font-size: 12px; font-weight: 500; line-height: 16px; letter-spacing: 0.02em; }

    /* Hairline border utility */
    .nx-border { border: 1px solid var(--nx-border-soft); }
    .nx-border-strong { border: 1px solid var(--nx-border); }

    /* Flat card surfaces */
    .nx-card { background: var(--nx-surface); border: 1px solid var(--nx-border-soft); border-radius: 0; }
    .nx-card-hero { background: var(--nx-surface); border: 1px solid var(--nx-border-soft); border-radius: 31px; }

    /* Collapse button + panel */
    .nx-collapse-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; background: transparent; color: var(--nx-muted);
      border: 1px solid var(--nx-border-soft); border-radius: 0; cursor: pointer;
      font-family: inherit; font-size: 10px; font-weight: 500;
      letter-spacing: 0.08em; text-transform: uppercase;
      transition: all 150ms ease;
    }
    .nx-collapse-btn:hover { background: var(--nx-ink); color: #FFFFFF; border-color: var(--nx-ink); }
    .nx-collapse-btn .nx-chev { transition: transform 300ms ease; font-size: 9px; }
    .nx-collapse-btn.open .nx-chev { transform: rotate(180deg); }
    .nx-collapse-panel {
      max-height: 0; overflow: hidden;
      transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .nx-collapse-panel.open { max-height: 1400px; }

    /* Pill button (primary CTA) */
    .nx-btn-primary {
      background: var(--nx-ink); color: #FFFFFF;
      border-radius: 9999px; padding: 6px 18px;
      font-weight: 500; font-size: 12px; letter-spacing: 0.02em;
      transition: background 150ms ease;
    }
    .nx-btn-primary:hover { background: var(--nx-accent); }

    /* Input fields — flat, hairline, no rounded blobs */
    input[type="number"] {
      background: var(--nx-surface) !important;
      border: 1px solid var(--nx-border-soft) !important;
      border-radius: 0 !important;
      font-weight: 400 !important;
      transition: border-color 150ms ease, background 150ms ease;
    }
    input[type="number"]:focus {
      outline: none;
      border-color: var(--nx-ink) !important;
      background: #F8F7F3 !important;
    }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { opacity:.4 }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { display: inline-block; animation: spin 1s linear infinite; }

    /* pre-load dynamic Tailwind colours (semantic — kept for profit/loss) */
    .tw-pre { display:none }
    .tw-pre span {
      color: rgb(5 150 105);
      color: rgb(225 29 72);
      background-color: #d1fae5;
      background-color: #ffe4e6;
    }

    /* Advanced collapsible panel */
    .adv-panel {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.45s cubic-bezier(0.4,0,0.2,1);
    }
    .adv-panel.open { max-height: 800px; }

    /* Tooltip — reframed on light surface */
    .tip-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      cursor: help;
    }
    .tip-box {
      display: none;
      position: fixed;
      width: 290px;
      background: var(--nx-ink);
      border: 1px solid #334155;
      border-radius: 0;
      padding: 14px 16px;
      z-index: 9999;
      box-shadow: 0 16px 48px rgba(15,23,42,0.35);
      pointer-events: none;
    }
    .tip-box::after {
      content: '';
      position: absolute;
      top: 100%;
      left: var(--arrow-left, 50%);
      transform: translateX(-50%);
      border: 7px solid transparent;
      border-top-color: #334155;
    }
    .tip-box.tip-below::after {
      top: auto;
      bottom: 100%;
      border-top-color: transparent;
      border-bottom-color: #334155;
    }

    /* Subtle Nexus "line lattice" nod for hero card (per WebGL section of spec, CSS-only) */
    .nx-lattice {
      position: relative; overflow: hidden;
    }
    .nx-lattice::before {
      content: ''; position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(249,115,22,0.12) 1px, transparent 1px),
        linear-gradient(90deg, rgba(249,115,22,0.12) 1px, transparent 1px);
      background-size: 24px 24px;
      mask-image: radial-gradient(ellipse at 80% 50%, black 20%, transparent 75%);
      -webkit-mask-image: radial-gradient(ellipse at 80% 50%, black 20%, transparent 75%);
      pointer-events: none;
    }
  </style>
</head>
<body style="background:var(--nx-bg)" class="min-h-screen">

<div class="tw-pre"><span></span></div>
<div id="app" class="max-w-7xl mx-auto" style="padding:28px 32px 48px;display:flex;flex-direction:column;gap:24px"></div>

<script>
/* ═══════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════ */
const BASE_DATE = new Date();

const state = {
  std: {
    name: 'Обычная кофемашина',
    basePrice: 700000,  parkSize: 50,
    coffeePrice: 1500,  coffeeBlackDose: 18, coffeeMilkDose: 18,
    milkPrice: 80,      milkDose: 200,
    priceAmericano: 150, priceCappuccino: 200,
    milkShare: 70,      cupsPerDay: 40,     opex: 9500,
    fraud: 25,
  },
  drx: {
    name: 'DrinkX',
    basePrice: 1200000, parkSize: 50,
    coffeePrice: 1600 / 3, coffeeBlackDose: 30, coffeeMilkDose: 17,
    milkPrice: 80,      milkDose: 180,
    priceAmericano: 150, priceCappuccino: 200,
    milkShare: 70,      cupsPerDay: 50,     opex: 3500,
    fraud: 0,
  },
};

/* ═══════════════════════════════════════════════════════════
   CALCULATION
═══════════════════════════════════════════════════════════ */
function calc(d) {
  let disc = 0;
  if      (d.parkSize >= 50) disc = 0.10;
  else if (d.parkSize >= 10) disc = 0.05;

  const capexTotal = d.basePrice * d.parkSize * (1 - disc);
  const costAmt    = (d.coffeePrice / 1000) * d.coffeeBlackDose;
  const costCap    = ((d.coffeePrice / 1000) * d.coffeeMilkDose)
                   + ((d.milkPrice   / 1000) * d.milkDose);
  const mR = d.milkShare / 100, bR = 1 - mR;
  const avgCost    = costAmt * bR + costCap * mR;
  const avgPrice   = d.priceAmericano * bR + d.priceCappuccino * mR;
  const avgMargin  = avgPrice - avgCost;
  const mCups      = d.cupsPerDay * 30 * d.parkSize;
  const cogsPark   = mCups * avgCost;
  const fraudR     = Math.max(0, Math.min(100, d.fraud || 0)) / 100;
  const fraudLoss  = mCups * avgPrice * fraudR;
  const profitPark = mCups * avgMargin - d.opex * d.parkSize - fraudLoss;
  const paybackMo  = profitPark > 0 ? capexTotal / profitPark : Infinity;

  // Yearly metrics
  const yearlyExpenses = (cogsPark + d.opex * d.parkSize + fraudLoss) * 12;
  const profit1Year    = profitPark * 12;
  const profit2Years   = profitPark * 24;

  let paybackDate = 'Никогда (убыток)';
  if (isFinite(paybackMo)) {
    const pd = new Date(BASE_DATE);
    pd.setMonth(pd.getMonth() + Math.ceil(paybackMo));
    let s = pd.toLocaleString('ru-RU', { month: 'long', year: 'numeric' });
    paybackDate = s[0].toUpperCase() + s.slice(1);
  }
  return { disc: disc * 100, capexTotal, costAmt, costCap, avgCost, cogsPark,
           avgPrice, avgMargin, profitPark, paybackMo, paybackDate,
           yearlyExpenses, profit1Year, profit2Years };
}

/* NPV — discounted at 12%/yr over `months` months */
function calcNPV(profit, capex, months = 36, annualRate = 0.12) {
  const r = Math.pow(1 + annualRate, 1 / 12) - 1; // monthly rate ≈ 0.949%
  if (r === 0) return -capex + profit * months;
  return -capex + profit * (1 - Math.pow(1 + r, -months)) / r;
}

/* IRR — bisection, return annual %, or null if not solvable */
function calcIRR(profit, capex, months = 36) {
  if (profit <= 0 || capex <= 0) return null;
  if (profit * months < capex) return null; // can't break even
  let lo = -0.9999, hi = 10.0;
  for (let i = 0; i < 200; i++) {
    const mid = (lo + hi) / 2;
    const r = mid;
    let npv;
    if (Math.abs(r) < 1e-9) {
      npv = -capex + profit * months;
    } else {
      npv = -capex + profit * (1 - Math.pow(1 + r, -months)) / r;
    }
    if (npv > 0) lo = mid; else hi = mid;
  }
  const rMonthly = (lo + hi) / 2;
  return (Math.pow(1 + rMonthly, 12) - 1) * 100;
}

/* ═══════════════════════════════════════════════════════════
   FORMATTERS
═══════════════════════════════════════════════════════════ */
const fCur  = v => new Intl.NumberFormat('ru-RU', { style:'currency', currency:'RUB', maximumFractionDigits:0 }).format(v);
const fCost = v => new Intl.NumberFormat('ru-RU', { style:'currency', currency:'RUB', maximumFractionDigits:2 }).format(v);
const fPct  = v => v == null ? 'N/A' : (v >= 0 ? '+' : '') + v.toFixed(1) + '%';

/* ═══════════════════════════════════════════════════════════
   HTML TEMPLATES
═══════════════════════════════════════════════════════════ */
function secHead(t) {
  return `<div class="nx-label" style="color:var(--nx-muted);text-transform:uppercase;margin:14px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--nx-border-soft);letter-spacing:0.08em;font-size:11px">${t}</div>`;
}

function inputRow(label, id, unit, isPercent) {
  return `
  <div class="flex items-center justify-between" style="padding:6px 0;border-bottom:1px solid rgba(203,213,225,0.4)">
    <label class="flex-1 pr-3 leading-snug" style="font-size:12px;color:var(--nx-ink);font-weight:300">${label}</label>
    <div class="relative w-32 shrink-0">
      <input type="number" min="0" ${isPercent ? 'max="100"' : ''} id="${id}"
        class="w-full text-right" style="padding:4px 26px 4px 8px;font-size:12px;font-weight:400;color:var(--nx-ink)">
      ${unit ? `<span class="absolute pointer-events-none" style="right:8px;top:5px;font-size:10px;color:var(--nx-muted);font-weight:400">${unit}</span>` : ''}
    </div>
  </div>`;
}

function resultRow(label, id, highlight, subId) {
  if (highlight) return `
  <div class="flex items-center justify-between" style="padding:8px 10px;margin-top:6px;background:#FFFFFF;border:1px solid var(--nx-border-soft);border-radius:0">
    <span style="font-size:12px;font-weight:500;color:var(--nx-ink)">${label}</span>
    <span id="${id}" style="font-size:15px;font-weight:500;color:var(--nx-ink);letter-spacing:-0.02em;margin-left:12px">—</span>
  </div>`;
  return `
  <div class="flex items-center justify-between" style="padding:5px 0;border-bottom:1px solid rgba(203,213,225,0.4)">
    <div class="flex flex-col">
      <span style="font-size:12px;color:var(--nx-ink);font-weight:300">${label}</span>
      ${subId ? `<span id="${subId}" style="font-size:10px;color:var(--nx-muted);margin-top:1px;font-weight:300"></span>` : ''}
    </div>
    <span id="${id}" style="font-size:12px;font-weight:500;color:var(--nx-ink);margin-left:12px;flex-shrink:0">—</span>
  </div>`;
}

function colCard(key, isDrx) {
  const d = state[key];
  const hdrBg      = isDrx ? 'var(--nx-accent)' : 'var(--nx-ink)';
  const coffeeNoun = isDrx ? 'концентрата' : 'зерна';
  const coffeeCap  = isDrx ? 'Концентрат'  : 'Зерно';
  const accentCol  = isDrx ? 'var(--nx-accent)' : 'var(--nx-ink)';
  const pCAPEX = `${key}-capex-panel`;
  const pCOST  = `${key}-cost-panel`;
  return `
  <div class="nx-card overflow-hidden" style="${isDrx ? 'border-color:var(--nx-ink);border-width:2px' : ''}">
    <div class="flex items-center gap-3" style="padding:12px 20px;background:${hdrBg};color:#FFFFFF">
      <h2 style="font-size:15px;font-weight:500;letter-spacing:0.02em;color:#FFFFFF;text-transform:uppercase">${d.name}</h2>
      <span id="${key}-disc-badge" class="ml-auto nx-label hidden" style="background:rgba(255,255,255,0.18);color:#FFFFFF;padding:2px 10px;border-radius:9999px;font-size:10px"></span>
    </div>

    <!-- ── BLOCK 1 · Затраты CAPEX ────────────────────── -->
    <div style="padding:16px 20px;border-bottom:1px solid var(--nx-border-soft)">
      <div class="flex items-center justify-between" style="margin-bottom:10px">
        <span class="nx-label" style="color:var(--nx-muted);text-transform:uppercase;letter-spacing:0.08em;font-size:11px">ЗАТРАТЫ · CAPEX</span>
        <button type="button" class="nx-collapse-btn" data-nx-btn="${pCAPEX}" onclick="nxToggle('${pCAPEX}')">Настроить <span class="nx-chev">▾</span></button>
      </div>
      ${resultRow('Итоговый CAPEX парка', `${key}-capex`, false, `${key}-capex-sub`)}
      <div id="${pCAPEX}" class="nx-collapse-panel">
        <div style="padding-top:10px;padding-left:10px;border-left:2px solid ${accentCol}">
          ${inputRow(isDrx ? 'Базовая цена 1 машины (CAPEX)<span style="display:block;font-size:10px;color:var(--nx-muted);font-weight:400;margin-top:2px;letter-spacing:0.02em">Модель DrinkX S100</span>' : 'Базовая цена 1 машины (CAPEX)', `${key}-basePrice`, '₽')}
          ${inputRow('Количество машин в парке', `${key}-parkSize`, 'шт')}
        </div>
      </div>
    </div>

    <!-- ── BLOCK 2 · Себестоимость и маржа ──────────────── -->
    <div style="padding:16px 20px;border-bottom:1px solid var(--nx-border-soft)">
      <div class="flex items-center justify-between" style="margin-bottom:10px">
        <span class="nx-label" style="color:var(--nx-muted);text-transform:uppercase;letter-spacing:0.08em;font-size:11px">СЕБЕСТОИМОСТЬ И МАРЖА</span>
        <button type="button" class="nx-collapse-btn" data-nx-btn="${pCOST}" onclick="nxToggle('${pCOST}')">Настроить <span class="nx-chev">▾</span></button>
      </div>
      ${resultRow(`С/с Американо (${isDrx ? 'концентрат' : 'зерно'})`, `${key}-costAmt`)}
      ${resultRow(`С/с Капучино (${isDrx ? 'концентрат' : 'зерно'})`,  `${key}-costCap`)}
      <div style="padding-top:8px;margin-top:8px;border-top:1px solid var(--nx-border-soft)">
        ${resultRow('Средняя с/с (взвешенная)', `${key}-avgCost`, false, `${key}-avgCost-sub`)}
        ${resultRow('Средняя цена продажи', `${key}-avgPrice`)}
        ${resultRow('Средняя маржа с 1 чашки', `${key}-avgMargin`, true)}
      </div>
      <div id="${pCOST}" class="nx-collapse-panel">
        <div style="padding-top:14px;padding-left:10px;border-left:2px solid ${accentCol}">
          ${secHead('Ингредиенты и сырьё')}
          ${inputRow(`Стоимость ${coffeeNoun} (за 1 ${isDrx ? 'л' : 'кг'})`, `${key}-coffeePrice`, '₽')}
          ${inputRow(`${coffeeCap} — чёрный кофе`,      `${key}-coffeeBlackDose`, isDrx ? 'мл' : 'г')}
          ${inputRow(`${coffeeCap} — молочный напиток`, `${key}-coffeeMilkDose`,  isDrx ? 'мл' : 'г')}
          ${inputRow('Молоко (за 1 л)',                 `${key}-milkPrice`, '₽')}
          ${inputRow('Расход молока на порцию',         `${key}-milkDose`,  'мл')}
          ${secHead('Цены и продажи')}
          ${inputRow('Цена Американо',                  `${key}-priceAmericano`,  '₽')}
          ${inputRow('Цена Капучино (300 мл)',          `${key}-priceCappuccino`, '₽')}
          ${inputRow('Доля молочных напитков',          `${key}-milkShare`, '%', true)}
          ${inputRow('Чашек в день (на 1 машину)',      `${key}-cupsPerDay`, 'шт')}
          ${secHead('Операционные')}
          ${inputRow('OPEX на 1 точку в месяц',         `${key}-opex`, '₽')}
          ${inputRow('Фрод (воровство от продаж)',      `${key}-fraud`, '%', true)}
        </div>
      </div>
    </div>

    <!-- ── BLOCK 3 · Прибыль ─────────────────────────────── -->
    <div style="padding:16px 20px;border-bottom:1px solid var(--nx-border-soft)">
      <span class="nx-label" style="color:var(--nx-muted);text-transform:uppercase;letter-spacing:0.08em;font-size:11px;display:block;margin-bottom:10px">ПРИБЫЛЬ</span>
      <div style="padding:12px 14px;border:1px solid #10B981;background:rgba(16,185,129,0.06)">
        <div class="flex justify-between items-center">
          <span class="nx-label" style="color:#047857;text-transform:uppercase;font-size:11px">ПРИБЫЛЬ ПАРКА / МЕС</span>
          <span id="${key}-profit" style="font-size:20px;font-weight:400;letter-spacing:-0.02em;color:#047857">—</span>
        </div>
      </div>
      <div style="margin-top:8px;padding:12px 14px;border:1px solid var(--nx-border-soft);background:var(--nx-bg)">
        <div style="display:flex;flex-direction:column;gap:8px">
          <div class="flex justify-between items-center">
            <span style="font-size:12px;color:var(--nx-muted);font-weight:300">Прибыль за 1 год</span>
            <span id="${key}-profit1yr" style="font-size:14px;font-weight:500;color:var(--nx-ink)">—</span>
          </div>
          <div class="flex justify-between items-center">
            <span style="font-size:12px;color:var(--nx-muted);font-weight:300">Прибыль за 2 года</span>
            <span id="${key}-profit2yr" style="font-size:14px;font-weight:500;color:var(--nx-ink)">—</span>
          </div>
          <div class="flex justify-between items-center" style="padding-top:8px;border-top:1px solid rgba(148,163,184,0.4)">
            <span style="font-size:12px;color:var(--nx-muted);font-weight:300">Затраты за год (COGS + OPEX + фрод)</span>
            <span id="${key}-yearexp" style="font-size:13px;font-weight:400;color:var(--nx-muted)">—</span>
          </div>
        </div>
      </div>
    </div>

    <!-- ── BLOCK 4 · Срок окупаемости ───────────────────── -->
    <div style="padding:16px 20px">
      <span class="nx-label" style="color:var(--nx-muted);text-transform:uppercase;letter-spacing:0.08em;font-size:11px;display:block;margin-bottom:10px">СРОК ОКУПАЕМОСТИ</span>
      <div style="padding:12px 14px;border:1px solid ${accentCol};background:${isDrx ? 'rgba(249,115,22,0.06)' : 'rgba(15,23,42,0.04)'}">
        <div class="flex justify-between items-center">
          <span class="nx-label" style="color:${accentCol};text-transform:uppercase;font-size:11px">ВРЕМЯ</span>
          <span id="${key}-paybackMo" style="font-size:20px;font-weight:400;letter-spacing:-0.02em;color:${accentCol}">—</span>
        </div>
        <div class="flex justify-between items-center" style="padding-top:6px;margin-top:6px;border-top:1px solid rgba(148,163,184,0.3)">
          <span style="font-size:10px;color:var(--nx-muted);font-weight:400">Абсолютная дата</span>
          <span id="${key}-paybackDate" style="font-size:12px;font-weight:500;color:var(--nx-ink)">—</span>
        </div>
      </div>
    </div>
  </div>`;
}

/* Collapse toggle — shared across Nexus color cards */
window.nxToggle = function(id) {
  const btn = document.querySelector(`[data-nx-btn="${id}"]`);
  const panel = document.getElementById(id);
  if (btn) btn.classList.toggle('open');
  if (panel) panel.classList.toggle('open');
};

function dashCard(id, title, sub, icon) {
  return `
  <div class="nx-card flex flex-col" style="padding:14px 16px;gap:6px;min-height:92px">
    <div class="flex items-center justify-between" style="gap:8px">
      <span class="nx-label" style="color:var(--nx-muted);text-transform:uppercase;font-size:10px;letter-spacing:0.08em;line-height:1.2">${title}</span>
      <span id="${id}-icon" class="flex items-center justify-center shrink-0" style="width:22px;height:22px;border:1px solid var(--nx-border-soft)">
        <span style="font-size:11px;line-height:1;color:var(--nx-muted)">${icon}</span>
      </span>
    </div>

function updateAll() {
  const sm = calc(state.std);
  const dm = calc(state.drx);

  updateColResults('std', sm, state.std);
  updateColResults('drx', dm, state.drx);

  // ── Dashboard metrics (used by KPI strip in hero) ──────
  const profitDiff  = dm.profitPark - sm.profitPark;
  const marginDiff  = dm.avgMargin  - sm.avgMargin;
  const marginPct   = sm.avgMargin > 0 ? (marginDiff / sm.avgMargin) * 100 : 0;
  const paybackDiff = sm.paybackMo  - dm.paybackMo;
  const bothLoss    = !isFinite(sm.paybackMo) && !isFinite(dm.paybackMo);

  // ── Hero Banner ────────────────────────────────────────
  const net3yr = profitDiff * 36 - (dm.capexTotal - sm.capexTotal);
  const hEl    = document.getElementById('hero-net3yr');
  const hSub   = document.getElementById('hero-net3yr-sub');
  if (hEl) {
    hEl.textContent = (net3yr >= 0 ? '+' : '') + fCur(net3yr);
    hEl.style.color = net3yr >= 0 ? '#34D399' : '#F87171';
  }
  if (hSub) {
    hSub.textContent = net3yr >= 0
      ? `С учётом разницы CAPEX ${fCur(dm.capexTotal - sm.capexTotal)}`
      : `DrinkX менее выгоден на 3-летнем горизонте при текущих параметрах`;
  }
  const delayEl = document.getElementById('hero-delay');
  if (delayEl) {
    delayEl.textContent = fCur(Math.abs(profitDiff)) + '/мес.';
    delayEl.style.color = profitDiff > 0 ? '#FCA5A5' : '#64748B';
  }

  // Hero KPI strip (3 metrics)
  const kpiProfitEl = document.getElementById('kpi-profit');
  if (kpiProfitEl) {
    kpiProfitEl.textContent = (profitDiff >= 0 ? '+' : '') + fCur(profitDiff);
    kpiProfitEl.style.color = profitDiff >= 0 ? '#34D399' : '#F87171';
  }
  const kpiMarginEl = document.getElementById('kpi-margin');
  if (kpiMarginEl) {
    const pctStr = marginPct === 0 ? '' : ` (${marginPct > 0 ? '+' : ''}${marginPct.toFixed(1)}%)`;
    kpiMarginEl.textContent = (marginDiff >= 0 ? '+' : '') + fCost(marginDiff) + pctStr;
    kpiMarginEl.style.color = marginDiff >= 0 ? '#FFFFFF' : '#F87171';
  }
  const kpiPaybackEl = document.getElementById('kpi-payback');
  if (kpiPaybackEl) {
    kpiPaybackEl.textContent = isFinite(dm.paybackMo) ? `${dm.paybackMo.toFixed(1)} мес.` : '—';
  }

  // ── Advanced Section ───────────────────────────────────
  const stdNPV = calcNPV(sm.profitPark, sm.capexTotal);
  const drxNPV = calcNPV(dm.profitPark, dm.capexTotal);
  const stdIRR = calcIRR(sm.profitPark, sm.capexTotal);
  const drxIRR = calcIRR(dm.profitPark, dm.capexTotal);
  const stdPPM = state.std.parkSize > 0 ? sm.profitPark / state.std.parkSize : 0;
  const drxPPM = state.drx.parkSize > 0 ? dm.profitPark / state.drx.parkSize : 0;

  setText('adv-npv-std', fCur(stdNPV));
  setText('adv-npv-drx', fCur(drxNPV));
  setText('adv-irr-std', stdIRR != null ? fPct(stdIRR) : 'N/A');
  setText('adv-irr-drx', drxIRR != null ? fPct(drxIRR) : 'N/A');
  setText('adv-ppm-std', fCur(stdPPM));
  setText('adv-ppm-drx', fCur(drxPPM));

  updateChart(sm, dm);
}

function setupInputListeners() {
  ['std','drx'].forEach(key => {
    Object.keys(state[key]).forEach(field => {
      if (field === 'name') return;
      const el = document.getElementById(`${key}-${field}`);
      if (el) el.addEventListener('input', () => {
        state[key][field] = Number(el.value) || 0;
        updateAll();

  ['analytics','marketing'].forEach(t => {

    btn.style.cssText = `padding:8px 0;border:none;border-bottom:2px solid ${active ? '#F97316' : 'transparent'};background:transparent;color:${active ? '#F97316' : '#94A3B8'};font-size:11px;font-weight:500;letter-spacing:0.05em;cursor:pointer;transition:all 150ms ease`;

/* ═══════════════════════════════════════════════════════════
   RULE-BASED TEXT GENERATORS
═══════════════════════════════════════════════════════════ */
function generateAuditText(sm, dm, std, drx) {
  const L = [];

  const drxWinProfit   = dm.profitPark  > sm.profitPark;
  const drxWinPayback  = isFinite(dm.paybackMo) && (!isFinite(sm.paybackMo) || dm.paybackMo < sm.paybackMo);
  const profitDiff     = dm.profitPark  - sm.profitPark;
  const profitDiffPct  = sm.profitPark  > 0 ? Math.abs((profitDiff / sm.profitPark) * 100).toFixed(1) : null;
  const paybackDiffMo  = isFinite(sm.paybackMo) && isFinite(dm.paybackMo)
                          ? Math.abs(sm.paybackMo - dm.paybackMo).toFixed(1) : null;

  L.push('ВЕРДИКТ');
  if (sm.profitPark < 0 && dm.profitPark < 0) {
    L.push('Обе модели убыточны при текущих параметрах. Пересмотрите цены на напитки и/или структуру OPEX — прежде чем сравнивать сроки окупаемости.');
  } else if (drxWinProfit && drxWinPayback) {
    L.push(`DrinkX выгоднее по обоим ключевым показателям: окупается быстрее${paybackDiffMo ? ` (на ${paybackDiffMo} мес.)` : ''} и даёт больше чистой прибыли${profitDiffPct ? ` (+${profitDiffPct}%, это ${fCur(profitDiff)}/мес.)` : ` (${fCur(profitDiff)}/мес.)`}.`);
    L.push(`Это объясняется более низким OPEX на точку (${fCur(drx.opex)} vs ${fCur(std.opex)}) и более высокой маржой с чашки (${fCost(dm.avgMargin)} vs ${fCost(sm.avgMargin)}).`);
  } else if (!drxWinProfit && !drxWinPayback) {
    const d = sm.profitPark - dm.profitPark;
    const pct = dm.profitPark > 0 ? Math.abs((d / dm.profitPark) * 100).toFixed(1) : null;
    L.push(`Обычная кофемашина выгоднее при текущих вводных: окупается быстрее${paybackDiffMo ? ` (на ${paybackDiffMo} мес.)` : ''} и генерирует больше прибыли${pct ? ` (+${pct}%, ${fCur(d)}/мес.)` : ''}.`);
    L.push(`Причина — значительно меньший CAPEX (${fCur(std.basePrice * std.parkSize)} vs ${fCur(drx.basePrice * drx.parkSize)}), который перевешивает преимущества DrinkX по марже.`);
  } else if (drxWinProfit && !drxWinPayback) {
    L.push(`DrinkX даёт больше прибыли в месяц (${fCur(Math.abs(profitDiff))} разница), но из-за более высокого CAPEX окупается дольше.`);
    L.push(`Если горизонт планирования — свыше ${isFinite(dm.paybackMo) ? Math.ceil(dm.paybackMo) : '?'} мес., DrinkX предпочтительнее. Для короткого горизонта — обычная машина.`);
  } else {
    L.push(`Обычная кофемашина окупается быстрее за счёт низкого CAPEX, но DrinkX обгоняет по ежемесячной прибыли.`);
    L.push(`Решение зависит от горизонта: быстрый возврат vs. долгосрочная доходность.`);
  }

  L.push('');
  L.push('КЛЮЧЕВЫЕ ЦИФРЫ');
  L.push(`- Прибыль/мес — ${std.name}: ${fCur(sm.profitPark)} | ${drx.name}: ${fCur(dm.profitPark)}`);
  L.push(`- Маржа/чашка  — ${std.name}: ${fCost(sm.avgMargin)} | ${drx.name}: ${fCost(dm.avgMargin)}`);
  L.push(`- Срок окупаемости — ${std.name}: ${isFinite(sm.paybackMo) ? sm.paybackMo.toFixed(1) + ' мес.' : 'не окупается'} | ${drx.name}: ${isFinite(dm.paybackMo) ? dm.paybackMo.toFixed(1) + ' мес.' : 'не окупается'}`);
  L.push(`- CAPEX парка — ${std.name}: ${fCur(sm.capexTotal)} | ${drx.name}: ${fCur(dm.capexTotal)}`);

  L.push('');
  L.push('ГЛАВНЫЙ ФИНАНСОВЫЙ РИСК');
  const rD = dm; const rS = drx;

  if (!isFinite(rD.paybackMo)) {
    L.push('Модель DrinkX не окупается при текущих параметрах. Ключевой риск — недостаточная маржинальность: нужно либо поднять цены, либо снизить OPEX.');
  } else {
    const profitAt80 = (rS.cupsPerDay * 0.8 * 30 * rS.parkSize) * rD.avgMargin - rS.opex * rS.parkSize;
    const newPayback = profitAt80 > 0 ? (rD.capexTotal / profitAt80).toFixed(1) : null;

    if (profitAt80 < 0) {
      L.push(`Высокая чувствительность к трафику. Снижение продаж на 20% (с ${rS.cupsPerDay} до ${Math.round(rS.cupsPerDay * 0.8)} чашек/день) переводит DrinkX в убыток.`);
      L.push(`Рекомендуется создать резервный фонд не менее ${fCur(Math.abs(profitAt80) * 3)} (3 месяца покрытия убытка при таком сценарии).`);
    } else if (newPayback && parseFloat(newPayback) > rD.paybackMo * 1.5) {
      L.push(`Умеренная чувствительность к трафику. При −20% продаж срок окупаемости DrinkX вырастает с ${rD.paybackMo.toFixed(1)} до ${newPayback} мес.`);
      L.push(`Дополнительный риск — рост цен на концентрат: каждые +100 ₽/кг снижают маржу DrinkX приблизительно на ${fCost((rS.coffeeMilkDose / 1000) * 100 * (rS.milkShare / 100) + (rS.coffeeBlackDose / 1000) * 100 * (1 - rS.milkShare / 100))} с чашки.`);
    } else {
      L.push(`Модель устойчива: даже при −20% трафика DrinkX остаётся прибыльным (${fCur(profitAt80)}/мес.), срок окупаемости вырастет до ~${newPayback} мес.`);
      L.push(`Основной риск — рост стоимости молока. Каждые +10 ₽/л увеличивают с/с капучино на ${fCost((rS.milkDose / 1000) * 10)} и снижают ежемесячную прибыль парка приблизительно на ${fCur((rS.milkDose / 1000) * 10 * (rS.milkShare / 100) * rS.cupsPerDay * 30 * rS.parkSize)}.`);
    }
  }

  L.push('');
  L.push('2 РЕКОМЕНДАЦИИ ПО РОСТУ МАРЖИНАЛЬНОСТИ');

  const opexRatio = rS.opex / (rD.profitPark + rS.opex);
  if (rS.milkShare >= 65) {
    const milkSaving15 = (rS.milkDose / 1000) * rS.milkPrice * (rS.milkShare / 100) * rS.cupsPerDay * 30 * rS.parkSize * 0.15;
    L.push(`1. Оптимизация нормы молока. Доля молочных напитков — ${rS.milkShare}%. Уменьшение порции молока на 15–20 мл при той же подаче (более высокая температура, лучшее взбивание) снизит с/с капучино на ${fCost((rS.milkDose * 0.15 / 1000) * rS.milkPrice)} за чашку. По парку это примерно ${fCur(milkSaving15)}/мес. без видимого изменения продукта.`);
  } else {
    const extraIfMilk60 = (0.60 - rS.milkShare / 100) * rS.cupsPerDay * 30 * rS.parkSize * (rD.avgMargin - rD.avgCost * 0.1);
    L.push(`1. Повышение доли молочных напитков. Сейчас ${rS.milkShare}% — молочные, хотя их маржа выше американо. Целевой ориентир — 60%. Маркеры: визуальное меню с акцентом на капучино, тренинг на «допродажу». Потенциал: +${fCur(Math.max(0, extraIfMilk60))}/мес. при той же аудитории.`);
  }

  if (isFinite(rD.paybackMo) && opexRatio > 0.35) {
    const opexCut15 = rS.opex * rS.parkSize * 0.15;
    L.push(`2. Ревизия OPEX. Операционные расходы (${fCur(rS.opex)}/точку) составляют ${(opexRatio * 100).toFixed(0)}% от валовой прибыли — это много. Аудит трёх статей: (а) графики работы vs. реальный трафик по часам, (б) расход расходников через контроль норм, (в) групповые закупки на уровне сети. Снижение OPEX на 15% высвобождает ${fCur(opexCut15)}/мес.`);
  } else {
    const priceUp = 20;
    const extraProfit = rS.cupsPerDay * 30 * rS.parkSize * priceUp;
    L.push(`2. Тест повышения цены. Текущие цены: американо ${rS.priceAmericano} ₽, капучино ${rS.priceCappuccino} ₽. Повышение на ${priceUp} ₽ при сохранении трафика добавит ${fCur(extraProfit)}/мес. к прибыли парка. Рекомендуем A/B тест: поднять цены на 1–2 точках на 2 недели и сравнить конверсию.`);
  }

  return L.join('\n');
}

function generateMarketingText(dm, drx) {
  const L = [];

  L.push('3 МАРКЕТИНГОВЫЕ ИДЕИ ДЛЯ РОСТА ПРОДАЖ НА +20% ЗА МЕСЯЦ');
  L.push('');

  if (drx.milkShare >= 60) {
    L.push('☕  ИДЕЯ 1 — «Сезонный хит» (капитализировать на молочных напитках)');
    L.push(`У вас ${drx.milkShare}% продаж — молочные. Запустите лимитированный вкус месяца: один сироп (карамель, лаванда, фисташка) только на этот месяц. Ограниченность создаёт срочность, сторис в соцсетях — виральность. Стоимость запуска: 1 бутылка сиропа (~400–600 ₽), доп. маржа — ${fCost(50 * (drx.milkShare / 100))} с чашки.`);
    L.push(`Ожидаемый эффект: +10–15% к среднему чеку молочных позиций, рост трафика через UGC.`);
  } else {
    L.push('☕  ИДЕЯ 1 — «Молочный апгрейд» (поднять долю молочных)');
    L.push(`Молочные — только ${drx.milkShare}% продаж, хотя маржа у них выше. Обучите команду предлагать «апгрейд»: «Хотите капучино вместо американо — всего +${drx.priceCappuccino - drx.priceAmericano} ₽?». Добавьте яркое меню-стоппер на точке.`);
    L.push(`Ожидаемый эффект: рост доли молочных до 50–55%, прирост средней маржи с чашки ~${fCost((0.55 - drx.milkShare / 100) * (dm.avgMargin * 0.2))}.`);
  }
  L.push('');

  if (drx.cupsPerDay < 80) {
    L.push('🎯  ИДЕЯ 2 — «Карта лояльности» (удержание и рост частоты)');
    L.push(`${drx.cupsPerDay} чашек/день — есть резерв роста. Простейшая механика: каждая 6-я чашка бесплатно (стоимость бонуса — ${fCost(dm.avgCost)}, с/с одной чашки). При увеличении частоты визитов на 20% парк получает дополнительно ~${fCur(drx.cupsPerDay * 0.2 * 30 * drx.parkSize * dm.avgMargin)}/мес.`);
    L.push(`Ожидаемый эффект: +15–25% к частоте повторных визитов за первые 30 дней.`);
  } else if (drx.cupsPerDay < 150) {
    L.push('🎯  ИДЕЯ 2 — «Утренний поток» (захват офф-пик часов)');
    L.push(`Предложите скидку 15–20 ₽ на американо с 07:00 до 09:00. Потеря на одной чашке компенсируется объёмом и тем, что утренние клиенты становятся постоянными. Доп. трафик +${Math.round(drx.cupsPerDay * 0.15)} чашек/день в тихое время не ест в прайм.`);
    L.push(`Ожидаемый эффект: +20–30 чашек/день в утреннее окно, высокая конверсия в постоянных гостей.`);
  } else {
    L.push('🎯  ИДЕЯ 2 — «Комбо-апгрейд» (рост среднего чека при высоком трафике)');
    L.push(`При ${drx.cupsPerDay} чашках/день трафик уже сильный — фокус на чеке. Запустите комбо «Напиток + выпечка/снек» со скидкой 10% на позицию. Снек приносит маржу, напиток фиксирует привычку.`);
    L.push(`Ожидаемый эффект: рост среднего чека на 50–100 ₽, без увеличения трафика.`);
  }
  L.push('');

  if (drx.parkSize >= 3) {
    L.push(`📍  ИДЕЯ 3 — «Сетевой паспорт» (использовать масштаб ${drx.parkSize} точек)`);
    L.push(`Запустите «кофейный паспорт»: посети все ${drx.parkSize} точки за месяц — получи бесплатный напиток. Создаёт кросс-трафик между точками и геймификацию без бюджета на рекламу.`);
    L.push(`Ожидаемый эффект: +5–10% к суммарным продажам за счёт перераспределения трафика, рост узнаваемости сети.`);
  } else if (drx.parkSize === 2) {
    L.push('📍  ИДЕЯ 3 — «Партнёрство с соседним бизнесом»');
    L.push(`Договоритесь с офисом, фитнес-клубом или магазином рядом: их клиенты получают скидку 10% по промокоду, вы — гарантированный поток без бюджета на рекламу.`);
    L.push(`Ожидаемый эффект: +10–20 новых клиентов/день с первой недели.`);
  } else {
    L.push('📍  ИДЕЯ 3 — «Корпоративные продажи»');
    L.push(`Один офис с 20 сотрудниками — это 20+ чашек/день в шаговой доступности. Предложите корпоративный тариф: абонемент на 20 чашек/мес. по цене 18 (−10%). Вы фиксируете объём заранее, компания получает удобство.`);
    const corpExtra = 20 * dm.avgMargin * 0.9;
    L.push(`Ожидаемый эффект: 1 корпоративный клиент добавляет ~${fCur(corpExtra * 30)}/мес. стабильной выручки.`);
  }

  return L.join('\n');
}

/* ═══════════════════════════════════════════════════════════
   TOOLTIPS — fixed positioning to escape overflow:hidden
═══════════════════════════════════════════════════════════ */
function initTooltips() {
  document.querySelectorAll('.tip-wrap').forEach(wrap => {
    const box = wrap.querySelector('.tip-box');
    if (!box) return;

    wrap.addEventListener('mouseenter', () => {
      box.style.display = 'block';
      const bw = 290;
      const margin = 10;
      const rect = wrap.getBoundingClientRect();
      const bh = box.offsetHeight;

      // Horizontal: center on element, clamp to viewport
      let left = rect.left + rect.width / 2 - bw / 2;
      left = Math.max(8, Math.min(left, window.innerWidth - bw - 8));

      // Vertical: prefer above, flip below if not enough room
      let top = rect.top - bh - margin;
      let arrowPos = '50%';
      if (top < 8) {
        top = rect.bottom + margin;
        box.classList.add('tip-below');
      } else {
        box.classList.remove('tip-below');
      }

      // Recalc arrow X relative to box
      const centerX = rect.left + rect.width / 2;
      arrowPos = Math.round(centerX - left) + 'px';
      box.style.setProperty('--arrow-left', arrowPos);

      box.style.left = left + 'px';
      box.style.top  = top  + 'px';
    });

    wrap.addEventListener('mouseleave', () => {
      box.style.display = 'none';
    });
  });
}
